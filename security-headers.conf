# Security Headers Configuration
# Add these headers to your web server configuration (Apache/Nginx)

# Content Security Policy
Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self';

# X-Frame-Options (prevent clickjacking)
X-Frame-Options: DENY

# X-Content-Type-Options (prevent MIME sniffing)
X-Content-Type-Options: nosniff

# X-XSS-Protection (XSS protection)
X-XSS-Protection: 1; mode=block

# Referrer Policy
Referrer-Policy: strict-origin-when-cross-origin

# Permissions Policy (formerly Feature Policy)
Permissions-Policy: camera=(), microphone=(), geolocation=(), interest-cohort=()

# Strict Transport Security (HTTPS enforcement)
Strict-Transport-Security: max-age=31536000; includeSubDomains; preload

# Cross-Origin-Embedder-Policy
Cross-Origin-Embedder-Policy: require-corp

# Cross-Origin-Opener-Policy
Cross-Origin-Opener-Policy: same-origin

# Cross-Origin-Resource-Policy
Cross-Origin-Resource-Policy: same-origin

# Server signature hiding
Server: WebSapphire/1.0

# Remove X-Powered-By headers
# (Configure in server settings)

# Cache Control for security-sensitive files
Cache-Control: no-cache, no-store, must-revalidate (for sensitive pages)
Cache-Control: public, max-age=31536000, immutable (for static assets)

# Additional security headers for API endpoints
X-Robots-Tag: noindex, nofollow (for API routes)
X-Permitted-Cross-Domain-Policies: none
